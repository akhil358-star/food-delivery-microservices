version: '3.8'

services:

  zookeeper:
    image: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"

  discovery-server:
    build: ./backend/discovery-server
    ports:
      - "8761:8761"

  config-server:
    build: ./backend/config-server
    ports:
      - "8888:8888"
    depends_on:
      - discovery-server

  api-gateway:
    build: ./backend/api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - discovery-server
      - config-server

  user-service:
    build: ./backend/user-service
    ports:
      - "8081:8081"
    depends_on:
      - discovery-server
      - config-server

  auth-service:
    build: ./backend/auth-service
    ports:
      - "8082:8082"
    depends_on:
      - discovery-server
      - config-server

  restaurant-service:
    build: ./backend/restaurant-service
    ports:
      - "8083:8083"
    depends_on:
      - discovery-server
      - config-server

  order-service:
    build: ./backend/order-service
    ports:
      - "8084:8084"
    depends_on:
      - kafka
      - discovery-server
      - config-server

  payment-service:
    build: ./backend/payment-service
    ports:
      - "8085:8085"
    depends_on:
      - discovery-server
      - config-server

  notification-service:
    build: ./backend/notification-service
    ports:
      - "8086:8086"
    depends_on:
      - kafka
      - discovery-server
      - config-server