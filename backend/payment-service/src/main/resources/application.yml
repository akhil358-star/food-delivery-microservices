server:
  port: 8085

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:h2:mem:paymentdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

management:
  tracing:
    sampling:
      probability: 1.0

management.zipkin.tracing.endpoint: http://localhost:9411/api/v2/spans